<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reembolso · Olá mundo</title>
  <meta name="description" content="Página de status de deploy — App de Reembolso (demo de esteira CI/CD)." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b1220;
      --bg-2: #0e1729;
      --surface: #111c31;
      --surface-2: #16233d;
      --border: #22314f;
      --text: #e6edf7;
      --muted: #8ca0bd;
      --cyan: #22d3ee;
      /* Cores por ambiente — sobrescritas via classe no <body> */
      --env: #3b82f6;
      --env-soft: rgba(59,130,246,0.14);
    }
    body.env-dev      { --env: #3b82f6; --env-soft: rgba(59,130,246,0.14); }
    body.env-homolog  { --env: #f59e0b; --env-soft: rgba(245,158,11,0.14); }
    body.env-prod     { --env: #22c55e; --env-soft: rgba(34,197,94,0.14); }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(1200px 600px at 80% -10%, var(--env-soft), transparent 60%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 620px;
      background: linear-gradient(180deg, var(--surface), var(--bg-2));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 34px 30px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--env);
      background: var(--env-soft);
      border: 1px solid color-mix(in srgb, var(--env) 40%, transparent);
      padding: 7px 13px;
      border-radius: 999px;
    }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--env);
      box-shadow: 0 0 0 0 color-mix(in srgb, var(--env) 60%, transparent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--env) 55%, transparent); }
      70%  { box-shadow: 0 0 0 10px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    h1 {
      font-family: "Space Grotesk", "Inter", sans-serif;
      font-weight: 700;
      font-size: clamp(34px, 6vw, 52px);
      line-height: 1.02;
      margin: 22px 0 6px;
      letter-spacing: -0.02em;
    }
    h1 .wave { display: inline-block; transform-origin: 70% 70%; animation: wave 2.6s ease-in-out infinite; }
    @keyframes wave { 0%,60%,100%{transform:rotate(0)} 10%{transform:rotate(16deg)} 20%{transform:rotate(-8deg)} 30%{transform:rotate(16deg)} 40%{transform:rotate(-4deg)} 50%{transform:rotate(10deg)} }
    .sub {
      color: var(--muted);
      font-size: 15.5px;
      margin: 0 0 26px;
      max-width: 46ch;
      line-height: 1.55;
    }
    .app-name { color: var(--env); font-weight: 600; }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      font-family: "JetBrains Mono", ui-monospace, monospace;
    }
    .meta div {
      background: var(--surface-2);
      padding: 13px 15px;
    }
    .meta .k { color: var(--muted); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
    .meta .v { color: var(--text); font-size: 14px; margin-top: 3px; font-weight: 500; word-break: break-all; }
    .footer {
      margin-top: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12.5px;
    }
    .footer a { color: var(--cyan); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .pipe {
      display: flex; align-items: center; gap: 7px;
      font-family: "JetBrains Mono", monospace; font-size: 11.5px;
    }
    .step { color: var(--muted); }
    .step.on { color: var(--env); font-weight: 600; }
    .arrow { color: var(--border); }
    @media (max-width: 480px) { .meta { grid-template-columns: 1fr; } }
    @media (prefers-reduced-motion: reduce) { .dot, h1 .wave { animation: none; } }
  </style>
</head>
<body class="env-__ENV_KEY__">
  <main class="card">
    <span class="badge"><span class="dot"></span>Ambiente: __ENV_NAME__</span>
    <h1>Olá, mundo <span class="wave">👋</span></h1>
    <p class="sub">
      Deploy do <span class="app-name">App de Reembolso</span> concluído com sucesso.
      Esta página é publicada pela esteira CI/CD a cada promoção entre ambientes.
    </p>

    <div class="meta">
      <div><div class="k">Versão</div><div class="v">__VERSION__</div></div>
      <div><div class="k">Commit</div><div class="v">__COMMIT__</div></div>
      <div><div class="k">Publicado em</div><div class="v">__DEPLOY_TIME__</div></div>
      <div><div class="k">Pipeline run</div><div class="v">#__RUN_NUMBER__</div></div>
    </div>

    <div class="footer">
      <div class="pipe">
        <span class="step" data-env="dev">Dev</span><span class="arrow">→</span>
        <span class="step" data-env="homolog">Homolog</span><span class="arrow">→</span>
        <span class="step" data-env="prod">Prod</span>
      </div>
      <a href="./dashboard.html">Ver dashboard DORA →</a>
    </div>
  </main>

  <script>
    // Fallback para abrir o arquivo localmente (sem passar pela esteira):
    // se os placeholders não foram substituídos, assume ambiente "dev".
    (function () {
      const body = document.body;
      if (body.className.includes('__')) {
        body.className = 'env-dev';
      }
      const key = (body.className.match(/env-(\w+)/) || [,'dev'])[1];
      const on = document.querySelector('.step[data-env="' + key + '"]');
      if (on) on.classList.add('on');

      document.querySelectorAll('.v').forEach(function (el) {
        if (el.textContent.includes('__')) {
          el.textContent = 'local';
        }
      });
      document.querySelectorAll('.badge').forEach(function (el) {
        el.innerHTML = el.innerHTML.replace('__ENV_NAME__', 'Desenvolvimento (local)');
      });
    })();
  </script>
</body>
</html>
